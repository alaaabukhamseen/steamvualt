<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>Steamvault Cloud PRO - Management Edition</title>
    <style>
        :root {
            --primary: #00f7ff;
            --secondary: #0f172a;
            --success: #22c55e;
            --danger: #ff5c5c;
            --warning: #f59e0b;
            --bg-dark: #05070f;
            --head: #ffcc00;
            --discord: #5865F2; /* لون الديسكورد */
        }

        body {
            margin:0;
            background: linear-gradient(135deg, #0b0f1a, var(--bg-dark));
            font-family: 'Segoe UI', Tahoma, sans-serif;
            color: white;
            min-height: 100vh;
        }

        /* الهيدر واللوحة */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 25px;
            background: var(--secondary);
            border-bottom: 2px solid var(--primary);
            position: sticky; top: 0; z-index: 100;
        }

        .title { font-size: 24px; color: var(--primary); font-weight: bold; }

        .dashboard {
            display: none;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            padding: 15px 20px;
            background: #1e293b;
        }

        .stat-card {
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            border-left: 4px solid var(--primary);
        }

        /* الأزرار */
        .btn-group { display: flex; gap: 8px; align-items: center; }
        .btn {
            border: none; padding: 10px 16px; border-radius: 6px;
            cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .btn:hover { opacity: 0.8; transform: scale(1.02); }
        .btn-admin { background: var(--primary); color: #000; }
        .btn-add { background: var(--success); color: white; display: none; }
        .btn-manage { background: var(--danger); color: white; display: none; }
        
        /* ستايل زر الديسكورد الجديد */
        .btn-discord {
            background: var(--discord); 
            color: white; 
            text-decoration: none; 
            display: inline-flex; 
            align-items: center; 
            font-size: 14px;
        }

        /* البطاقات */
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 25px;
            padding: 25px;
        }
        .card {
            background: var(--secondary);
            border-radius: 12px;
            padding: 12px;
            cursor: pointer;
            transition: .3s;
            border: 1px solid #1e293b;
            text-align: center;
        }
        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 30px rgba(0, 247, 255, 0.2);
            border-color: var(--primary);
        }
        .card img {
            width: 100%; height: 150px;
            object-fit: cover; border-radius: 8px;
        }

        /* النوافذ المنبثقة */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: none; align-items: center; justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }
        .popup {
            background: var(--secondary);
            padding: 25px; border-radius: 15px;
            width: 90%; max-width: 500px;
            max-height: 85vh; overflow-y: auto;
            border: 1px solid #334155;
        }

        input, textarea {
            width: 100%; padding: 12px; margin: 8px 0;
            border-radius: 8px; border: 1px solid #334155;
            background: #1e293b; color: white; box-sizing: border-box;
        }

        .copy-row {
            display: flex; align-items: center; justify-content: space-between;
            background: #1e293b; padding: 10px; border-radius: 8px; margin-bottom: 10px;
        }

        .key-manager {
            margin-top: 15px; padding-top: 15px; border-top: 1px solid #334155;
        }
        
        .badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-left: 10px; }
        .badge-live { background: var(--success); }
    </style>
</head>
<body>

<div class="dashboard" id="dash">
    <div class="stat-card"><small>Cloud Accounts</small><br><span id="countAcc">0</span></div>
    <div class="stat-card"><small>Current Role</small><br><span id="roleDisplay">Guest</span></div>
</div>

<div class="header">
    <div class="title">Steamvault <span class="badge badge-live">LIVE CLOUD - V3</span></div>
    <div class="btn-group">
        <a href="https://discord.gg/nqHyAEqJsn" target="_blank" class="btn btn-discord">Discord Server</a>
        
        <button class="btn btn-manage" id="manageBtn" onclick="openKeyManager()">Manage All Keys</button>
        <button class="btn btn-add" id="addBtn" onclick="openAddCard()">+ Add Account</button>
        <button class="btn btn-admin" id="loginBtn" onclick="systemLogin()">Login</button>
    </div>
</div>

<div class="cards" id="container"></div>

<div class="overlay" id="overlay">
    <div class="popup" id="popup"></div>
</div>

<script>
    // --- بيانات الربط السحابي ---
    const BIN_ID = "69b45de7aa77b81da9e13d8e"; 
    const MASTER_KEY = "$2a$10$J7Z/r.is/jh/sMCRDhBS5uNsWhpJAjtrNkqGkMi1wv2Paq2Ux4GuW";
    
    // الحالة المحلية
    let state = {
        cards: [],
        admins: ["Blue_lock1"],
        headAdmins: ["21640800"]
    };
    
    let currentUserRole = "Guest";

    // 1. جلب البيانات من السحابة
    async function fetchCloud() {
        try {
            // إضافة وقت عشوائي للرابط لمنع الكاش نهائياً من استرجاع بيانات قديمة
            const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest?t=${new Date().getTime()}`, {
                headers: { "X-Master-Key": MASTER_KEY, "Cache-Control": "no-cache" }
            });
            const data = await res.json();
            state = data.record;
            
            if(!state.admins) state.admins = ["Blue_lock1"];
            if(!state.headAdmins) state.headAdmins = ["21640800"];
            
            render();
        } catch (e) { console.error("Syncing Failed..."); }
    }

    // 2. حفظ البيانات في السحابة
    async function syncCloud() {
        await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
            method: 'PUT',
            headers: { "Content-Type": "application/json", "X-Master-Key": MASTER_KEY },
            body: JSON.stringify(state)
        });
        fetchCloud();
    }

    // 3. عرض البطاقات
    function render() {
        const container = document.getElementById('container');
        container.innerHTML = state.cards.length === 0 ? '<p style="text-align:center;width:100%">Empty Cloud.</p>' : '';
        
        state.cards.forEach((c, i) => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `
                <img src="${c.image || 'https://via.placeholder.com/150'}">
                <h3>${c.username}</h3>
                <small style="color:var(--primary)">Click to View</small>
            `;
            div.onclick = () => openCardDetails(i);
            container.appendChild(div);
        });

        document.getElementById('countAcc').innerText = state.cards.length;
    }

    // 4. نظام تسجيل الدخول
    function systemLogin() {
        let key = prompt("Enter Secret Key:");
        if (!key) return;

        if (state.headAdmins.includes(key)) {
            currentUserRole = "HeadAdmin";
            enableAdminUI(true);
        } else if (state.admins.includes(key)) {
            currentUserRole = "Admin";
            enableAdminUI(false);
        } else {
            alert("Invalid Key!");
        }
    }

    function enableAdminUI(isHead) {
        document.getElementById('addBtn').style.display = "block";
        document.getElementById('dash').style.display = "grid";
        document.getElementById('loginBtn').style.display = "none";
        document.getElementById('roleDisplay').innerText = currentUserRole;
        
        if (isHead) {
            document.getElementById('manageBtn').style.display = "block";
        }
        render();
    }

    // 5. عرض تفاصيل الكارد
    function openCardDetails(i) {
        const c = state.cards[i];
        const popup = document.getElementById('popup');
        
        popup.innerHTML = `
            <img src="${c.image || ''}" style="width:100%; border-radius:10px;">
            <h2 style="color:var(--primary)">${c.username}</h2>
            <p>${c.description || 'No description provided.'}</p>
            
            <div id="wait-area" class="stat-card" style="border:none; background:#0b0f1a; margin-top:10px;">
                Decrypting... <span id="timer" style="color:var(--danger); font-weight:bold;">30</span>s
            </div>

            <div id="secret-area" style="display:none">
                <div class="copy-row"><span>User: ${c.username}</span><button class="btn" style="background:var(--success)" onclick="copy('${c.username}')">Copy</button></div>
                <div class="copy-row"><span>Pass: ${c.password}</span><button class="btn" style="background:var(--success)" onclick="copy('${c.password}')">Copy</button></div>
                ${(currentUserRole === "Admin" || currentUserRole === "HeadAdmin") ? `<button class="btn" style="background:var(--danger); width:100%;" onclick="deleteCard(${i})">Delete From Cloud</button>` : ''}
            </div>

            <button class="btn" style="width:100%; margin-top:15px; background:#475569" onclick="closePop()">Close</button>
        `;

        showPop();

        if (currentUserRole === "Admin" || currentUserRole === "HeadAdmin") {
            document.getElementById('wait-area').style.display = "none";
            document.getElementById('secret-area').style.display = "block";
        } else {
            let t = 30;
            let itv = setInterval(() => {
                t--;
                let ts = document.getElementById('timer');
                if(ts) ts.innerText = t;
                if(t <= 0) {
                    clearInterval(itv);
                    if(document.getElementById('wait-area')) document.getElementById('wait-area').style.display = "none";
                    if(document.getElementById('secret-area')) document.getElementById('secret-area').style.display = "block";
                }
            }, 1000);
        }
    }

    // 6. لوحة إدارة المفاتيح
    function openKeyManager() {
        if(currentUserRole !== "HeadAdmin") return alert("HeadAdmin Only!");
        
        const popup = document.getElementById('popup');
        popup.innerHTML = `
            <h2>System Key Manager</h2>
            
            <div class="key-manager">
                <h4>Admins Keys:</h4>
                <div style="background:#000; padding:10px; border-radius:8px; max-height:100px; overflow-y:auto; margin-bottom:10px;">
                    ${state.admins.map(k => `<div class="copy-row"><span>${k}</span><button onclick="removeKey('admins','${k}')" style="background:none; border:none; color:red; cursor:pointer;">✖</button></div>`).join('')}
                </div>
                <input id="newAdminK" placeholder="New Admin Key">
                <button class="btn btn-admin" style="width:100%" onclick="addNewKey('admins')">Add Admin Key</button>
            </div>

            <div class="key-manager">
                <h4>Head Admins Keys:</h4>
                <div style="background:#000; padding:10px; border-radius:8px; max-height:100px; overflow-y:auto; margin-bottom:10px;">
                    ${state.headAdmins.map(k => `<div class="copy-row"><span>${k}</span><button onclick="removeKey('headAdmins','${k}')" style="background:none; border:none; color:red; cursor:pointer;">✖</button></div>`).join('')}
                </div>
                <input id="newHeadK" placeholder="New HeadAdmin Key">
                <button class="btn" style="width:100%; background:var(--head); color:#000;" onclick="addNewKey('headAdmins')">Add HeadAdmin Key</button>
            </div>

            <button class="btn" style="width:100%; margin-top:20px; background:#475569" onclick="closePop()">Exit Manager</button>
        `;
        showPop();
    }

    function addNewKey(type) {
        let inputId = type === 'admins' ? 'newAdminK' : 'newHeadK';
        let val = document.getElementById(inputId).value;
        if(val) {
            state[type].push(val);
            syncCloud();
            openKeyManager();
        }
    }

    function removeKey(type, key) {
        if(state[type].length <= 1) return alert("Cannot remove the last key!");
        if(confirm("Remove this key?")) {
            state[type] = state[type].filter(k => k !== key);
            syncCloud();
            openKeyManager();
        }
    }

    // 7. إضافة كارد جديد
    function openAddCard() {
        const popup = document.getElementById('popup');
        popup.innerHTML = `
            <h2>Add Global Account</h2>
            <input type="file" id="fIn" onchange="encodeImg(event)">
            <input id="u" placeholder="Username">
            <input id="p" placeholder="Password">
            <textarea id="desc" placeholder="Details (Games, Level...)"></textarea>
            <button class="btn btn-admin" style="width:100%" onclick="saveCard()">Upload To Cloud</button>
            <button class="btn" style="width:100%; margin-top:10px; background:var(--danger)" onclick="closePop()">Cancel</button>
        `;
        showPop();
    }

    let tempImg = "";
    function encodeImg(e) {
        const reader = new FileReader();
        reader.onload = () => tempImg = reader.result;
        reader.readAsDataURL(e.target.files[0]);
    }

    async function saveCard() {
        const u = document.getElementById('u').value;
        const p = document.getElementById('p').value;
        const d = document.getElementById('desc').value;
        if(!u || !p) return alert("Required fields missing!");
        
        state.cards.unshift({ username: u, password: p, description: d, image: tempImg });
        closePop();
        await syncCloud();
        tempImg = "";
    }

    async function deleteCard(i) {
        if(confirm("Delete this for everyone?")) {
            state.cards.splice(i, 1);
            closePop();
            await syncCloud();
        }
    }

    function showPop() { document.getElementById('overlay').style.display = "flex"; }
    function closePop() { document.getElementById('overlay').style.display = "none"; }
    function copy(t) { navigator.clipboard.writeText(t); alert("Copied!"); }

    fetchCloud();
</script>
</body>
</html>
<!DOCTYPE html>
<html>
<head>
    <title>Debug Steamvault</title>
    <style>body{background:#0f172a; color:white; font-family:sans-serif; padding:20px;}</style>
</head>
<body>
    <h2>System Debugger</h2>
    <div id="status">جاري الاتصال بالسحابة...</div>
    <button onclick="testUpload()">تجربة رفع حساب تجريبي</button>

    <script>
        const BIN_ID = "69b45de7aa77b81da9e13d8e"; 
        const MASTER_KEY = "$2a$10$J7Z/r.is/jh/sMCRDhBS5uNsWhpJAjtrNkqGkMi1wv2Paq2Ux4GuW";

        async function testUpload() {
            document.getElementById('status').innerText = "جاري المحاولة...";
            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                    method: 'PUT',
                    headers: {
                        "Content-Type": "application/json",
                        "X-Master-Key": MASTER_KEY
                    },
                    body: JSON.stringify({
                        cards: [{ username: "TEST_USER", password: "123", description: "Test" }],
                        admins: ["Blue_lock1"],
                        headAdmins: ["21640800"]
                    })
                });
                const result = await response.json();
                if(result.record) {
                    document.getElementById('status').innerText = "تم الرفع بنجاح! السحابة تعمل.";
                } else {
                    document.getElementById('status').innerText = "خطأ في الرفع: " + JSON.stringify(result);
                }
            } catch (err) {
                document.getElementById('status').innerText = "خطأ في الاتصال: " + err.message;
            }
        }
    </script>
</body>
</html>
